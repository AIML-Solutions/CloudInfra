apiVersion: apps/v1
kind: Deployment
metadata:
  name: quanttools-validation-worker
  namespace: quanttools-local
  labels:
    app.kubernetes.io/name: quanttools-validation-worker
    app.kubernetes.io/part-of: aiml-solutions
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: quanttools-validation-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: quanttools-validation-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/aiml-solutions/quanttools:local
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: quanttools-runtime-config
          command:
            - python
            - -m
            - services.orchestration.source_matrix
          args:
            - --purpose
            - daily_baseline
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
